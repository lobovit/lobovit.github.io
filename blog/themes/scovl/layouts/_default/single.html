{{ define "main" }}
<article>
  <header>
    <h1>{{ .Title }}</h1>
    <p class="meta"><time>{{ .Date.Format "2006-01-02" }}</time>{{ if .Params.tags }} · {{ range .Params.tags }}<span class="tag">{{ . }}</span>{{ end }}{{ end }}</p>
  </header>
  <div class="content">
    {{ .Content }}
  </div>
</article>
{{ end }}
