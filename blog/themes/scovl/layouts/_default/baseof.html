<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="data:,">
  <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} — {{ .Site.Title }}{{ end }}</title>
  <link rel="stylesheet" href="{{ "css/main.css" | relURL }}">
  <link rel="stylesheet" href="{{ "vendor/fonts/fonts.css" | relURL }}">
  <link rel="stylesheet" href="{{ "vendor/prism/prism-tomorrow.min.css" | relURL }}">
</head>
<body>
  <div class="frame">
    <header>
      <nav>
        <a class="site-title" href="{{ .Site.BaseURL }}">{{ .Site.Title }}</a>
        <span class="nav-links">
          <a href="/page/about/">about</a>
          <a href="/page/contact/">contact</a>
        </span>
      </nav>
      <hr>
    </header>
    <main>
      {{ block "main" . }}{{ end }}
    </main>
    <hr>
    <footer>
    </footer>
  </div>
<script src="{{ "vendor/prism/prism-core.min.js" | relURL }}"></script>
<script src="{{ "vendor/prism/prism-clike.min.js" | relURL }}"></script>
<script src="{{ "vendor/prism/prism-bash.min.js" | relURL }}"></script>
<script src="{{ "vendor/prism/prism-c.min.js" | relURL }}"></script>
<script src="{{ "vendor/prism/prism-cpp.min.js" | relURL }}"></script>
<script src="{{ "vendor/prism/prism-rust.min.js" | relURL }}"></script>
<script src="{{ "vendor/prism/prism-go.min.js" | relURL }}"></script>
<script src="{{ "vendor/prism/prism-javascript.min.js" | relURL }}"></script>
<script src="{{ "vendor/prism/prism-typescript.min.js" | relURL }}"></script>
<script src="{{ "vendor/prism/prism-clojure.min.js" | relURL }}"></script>
<script src="{{ "vendor/prism/prism-lisp.min.js" | relURL }}"></script>
<script src="{{ "vendor/prism/prism-swift.min.js" | relURL }}"></script>
<script src="{{ "vendor/prism/prism-zig.min.js" | relURL }}"></script>
<script src="{{ "vendor/prism/prism-sql.min.js" | relURL }}"></script>
<script src="{{ "vendor/prism/prism-autoloader.min.js" | relURL }}"></script>
  <script src="{{ "vendor/mermaid/mermaid.min.js" | relURL }}"></script>
  <script>mermaid.initialize({ startOnLoad: true, theme: 'base', themeVariables: { fontFamily: '"Inter", system-ui, sans-serif', fontSize: '14px', primaryColor: '#bb86fc', primaryTextColor: '#e8e0f0', primaryBorderColor: '#6b58a0', lineColor: '#c792ea', secondaryColor: '#2d1b4e', tertiaryColor: '#362258' } });</script>
  <button class="back-to-top" onclick="window.scrollTo({top:0,behavior:'smooth'})">^ top</button>
  <script>
    var btn = document.querySelector('.back-to-top');
    window.addEventListener('scroll', function() {
      btn.classList.toggle('visible', window.scrollY > 400);
    });
  </script>
</body>
</html>
